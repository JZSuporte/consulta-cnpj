<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta CNPJ Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- SVGs INLINE ---
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconBriefcase = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>;
        const IconPhone = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconMail = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconCode = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
        const IconList = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const IconChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconSpinner = ({ className }) => <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>;

        // --- FUNÇÕES DE FORMATAÇÃO ---
        const applyCnpjMask = (value) => {
          return value
            .replace(/\D/g, '')
            .replace(/^(\d{2})(\d)/, '$1.$2')
            .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
            .replace(/\.(\d{3})(\d)/, '.$1/$2')
            .replace(/(\d{4})(\d)/, '$1-$2')
            .substring(0, 18);
        };

        const formatValue = (key, value) => {
          if (value === null || value === undefined || value === '') return <span className="text-gray-400 italic">Vazio</span>;
          const keyLower = String(key).toLowerCase();
          if (typeof value === 'boolean') return value ? <span className="text-green-600 font-medium">Sim</span> : <span className="text-red-600 font-medium">Não</span>;
          if (typeof value === 'number') {
            if (keyLower.includes('capital') || keyLower.includes('valor')) {
              return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
            }
            return value;
          }
          if (typeof value === 'string') {
            if (keyLower.includes('data') && /^\d{4}-\d{2}-\d{2}/.test(value)) {
              const d = new Date(value + 'T00:00:00'); 
              return d.toLocaleDateString('pt-BR');
            }
            if (keyLower.includes('cep') && value.length === 8) {
              return value.replace(/^(\d{5})(\d{3})$/, '$1-$2');
            }
            if ((keyLower.includes('cnpj') || keyLower.includes('cpf')) && value.length === 14) {
              return value.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
            }
          }
          return String(value);
        };

        const countFilledFields = (obj) => {
          if (obj === null || obj === undefined || obj === '') return 0;
          if (typeof obj !== 'object') return 1;
          let count = 0;
          for (let key in obj) {
            if (Object.prototype.hasOwnProperty.call(obj, key)) {
              const value = obj[key];
              if (value !== null && value !== undefined && value !== '') {
                if (typeof value === 'object' && !Array.isArray(value)) {
                  count += countFilledFields(value);
                } else if (Array.isArray(value)) {
                  value.forEach(item => { count += countFilledFields(item); });
                } else {
                  count += 1;
                }
              }
            }
          }
          return count;
        };

        // --- COMPONENTES ---
        const DynamicNode = ({ label, value, defaultExpanded = false }) => {
          const [expanded, setExpanded] = useState(defaultExpanded);
          const isObject = typeof value === 'object' && value !== null;
          const isArray = Array.isArray(value);

          if (!isObject) {
            return (
              <div className="flex flex-col sm:flex-row sm:items-baseline py-1 border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors px-2 rounded">
                <span className="font-semibold text-gray-700 min-w-[200px] capitalize text-sm">
                  {String(label).replace(/_/g, ' ')}:
                </span>
                <span className="text-gray-600 text-sm">{formatValue(label, value)}</span>
              </div>
            );
          }

          const isEmpty = isArray ? value.length === 0 : Object.keys(value).length === 0;

          return (
            <div className="py-1">
              <div 
                className={`flex items-center cursor-pointer select-none py-1.5 px-2 rounded hover:bg-blue-50 transition-colors ${expanded ? 'bg-slate-50' : ''}`}
                onClick={() => setExpanded(!expanded)}
              >
                <span className="text-blue-500 mr-2">
                  {expanded ? <IconChevronDown /> : <IconChevronRight />}
                </span>
                <span className="font-semibold text-gray-800 capitalize text-sm">
                  {String(label).replace(/_/g, ' ')}
                </span>
                <span className="ml-2 text-xs text-gray-400 bg-white border border-gray-200 px-2 py-0.5 rounded-full">
                  {isArray ? `[${value.length}]` : `{${Object.keys(value).length}}`}
                </span>
              </div>

              {expanded && !isEmpty && (
                <div className="ml-3 pl-3 border-l-2 border-blue-200 mt-1 space-y-1">
                  {isArray ? (
                    value.map((item, index) => (
                      <div key={index} className="bg-white border border-gray-100 p-2 rounded shadow-sm mb-2">
                        <DynamicNode label={`Item ${index + 1}`} value={item} defaultExpanded={true} />
                      </div>
                    ))
                  ) : (
                    Object.entries(value).map(([k, v]) => (
                      <DynamicNode key={k} label={k} value={v} defaultExpanded={false} />
                    ))
                  )}
                </div>
              )}
              {expanded && isEmpty && <div className="ml-6 mt-1 text-sm text-gray-400 italic">Vazio</div>}
            </div>
          );
        };

        const SummaryCard = ({ title, icon, children, className = '' }) => (
          <div className={`bg-white rounded-xl shadow-sm border border-slate-200 p-5 ${className}`}>
            <div className="flex items-center space-x-3 mb-4">
              <div className="bg-blue-100 p-2 rounded-lg text-blue-600">{icon}</div>
              <h3 className="text-lg font-bold text-slate-800">{title}</h3>
            </div>
            <div className="space-y-3 text-sm text-slate-600">{children}</div>
          </div>
        );

        // --- APP PRINCIPAL ---
        function App() {
          const [cnpj, setCnpj] = useState('');
          const [loading, setLoading] = useState(false);
          const [data, setData] = useState(null);
          const [error, setError] = useState('');
          const [viewMode, setViewMode] = useState('summary'); 
          const [copied, setCopied] = useState(false);

          const handleCnpjChange = (e) => { setCnpj(applyCnpjMask(e.target.value)); };

          const buscarCNPJ = async (e) => {
            if (e) e.preventDefault();
            const cleanCnpj = cnpj.replace(/\D/g, '');
            if (cleanCnpj.length !== 14) {
              setError('Por favor, informe um CNPJ válido com 14 dígitos.');
              return;
            }
            setLoading(true);
            setError('');
            setData(null);

            try {
              const response = await fetch(`https://publica.cnpj.ws/cnpj/${cleanCnpj}`);
              if (!response.ok) {
                if (response.status === 429) throw new Error('Limite de consultas excedido. Aguarde um minuto.');
                if (response.status === 400) throw new Error('CNPJ inválido ou mal formatado.');
                if (response.status === 404) throw new Error('CNPJ não encontrado na base de dados.');
                throw new Error(`Erro na consulta (Status ${response.status}).`);
              }
              const result = await response.json();
              setData(result);
              setViewMode('summary');
            } catch (err) {
              setError(err.message);
            } finally { setLoading(false); }
          };

          const copyJson = async () => {
            const jsonStr = JSON.stringify(data, null, 2);
            try {
              await navigator.clipboard.writeText(jsonStr);
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
            } catch (err) {
              const textArea = document.createElement("textarea");
              textArea.value = jsonStr;
              document.body.appendChild(textArea);
              textArea.select();
              document.execCommand('copy');
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
              document.body.removeChild(textArea);
            }
          };

          const totalFields = useMemo(() => data ? countFilledFields(data) : 0, [data]);

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-10">
              <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-10">
                <div className="max-w-6xl mx-auto px-4 py-6">
                  <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                      <h1 className="text-2xl font-extrabold text-blue-900 flex items-center gap-2"><IconBuilding /> Consulta CNPJ Pro</h1>
                      <p className="text-sm text-slate-500 mt-1">Dados públicos da Receita Federal em tempo real.</p>
                    </div>
                    <form onSubmit={buscarCNPJ} className="flex w-full md:w-auto max-w-md">
                      <input type="text" placeholder="00.000.000/0000-00" value={cnpj} onChange={handleCnpjChange} className="w-full px-4 py-3 border border-slate-300 rounded-l-lg focus:ring-2 focus:ring-blue-500 outline-none text-lg" maxLength="18" />
                      <button type="submit" disabled={loading} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-r-lg font-medium transition-colors flex items-center justify-center disabled:bg-blue-400">
                        {loading ? <IconSpinner className="h-5 w-5 text-white" /> : <IconSearch />}
                        <span className="hidden sm:inline sm:ml-2">Consultar</span>
                      </button>
                    </form>
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 py-8">
                {error && (
                  <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-md mb-8 flex items-start shadow-sm">
                    <div className="text-red-500 mr-3 mt-0.5"><IconInfo /></div>
                    <div>
                      <h3 className="text-red-800 font-bold">Erro na Consulta</h3>
                      <p className="text-red-700 text-sm mt-1">{error}</p>
                    </div>
                  </div>
                )}

                {loading && !data && (
                  <div className="flex flex-col items-center justify-center py-20 text-slate-400">
                    <IconSpinner className="h-10 w-10 text-blue-500 mb-4" />
                    <p className="animate-pulse">Consultando base de dados...</p>
                  </div>
                )}

                {data && !loading && (
                  <div className="space-y-6 animate-fade-in">
                    <div className="flex border-b border-slate-200 overflow-x-auto">
                      <button onClick={() => setViewMode('summary')} className={`py-3 px-6 text-sm font-medium border-b-2 flex items-center gap-2 whitespace-nowrap transition-colors ${viewMode === 'summary' ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><IconBuilding /> Resumo Essencial</button>
                      <button onClick={() => setViewMode('dynamic')} className={`py-3 px-6 text-sm font-medium border-b-2 flex items-center gap-2 whitespace-nowrap transition-colors ${viewMode === 'dynamic' ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><IconList /> Dados Completos</button>
                      <button onClick={() => setViewMode('raw')} className={`py-3 px-6 text-sm font-medium border-b-2 flex items-center gap-2 whitespace-nowrap transition-colors ${viewMode === 'raw' ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}><IconCode /> JSON Bruto</button>
                    </div>

                    {viewMode === 'summary' && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <SummaryCard title="Identificação" icon={<IconBuilding />}>
                          <p><span className="font-semibold">Razão Social:</span> {data.razao_social}</p>
                          <p><span className="font-semibold">Fantasia:</span> {data.estabelecimento?.nome_fantasia || <span className="text-slate-400 italic">Não informada</span>}</p>
                          <p><span className="font-semibold">CNPJ:</span> {applyCnpjMask(data.estabelecimento?.cnpj || cnpj)}</p>
                          <p><span className="font-semibold">Capital Social:</span> {formatValue('capital', data.capital_social)}</p>
                          <div className="mt-4 pt-4 border-t border-slate-100 flex items-center gap-2">
                            <span className="font-semibold">Situação:</span> 
                            <span className={`px-2 py-1 rounded text-xs font-bold uppercase tracking-wide ${data.estabelecimento?.situacao_cadastral === 'Ativa' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{data.estabelecimento?.situacao_cadastral || 'Desconhecida'}</span>
                            <span className="text-xs text-slate-500 ml-auto">Desde {formatValue('data', data.estabelecimento?.data_situacao_cadastral)}</span>
                          </div>
                        </SummaryCard>

                        <SummaryCard title="Localização" icon={<IconMapPin />}>
                          <p>{data.estabelecimento?.tipo_logradouro} {data.estabelecimento?.logradouro}, {data.estabelecimento?.numero}{data.estabelecimento?.complemento && ` - ${data.estabelecimento?.complemento}`}</p>
                          <p>{data.estabelecimento?.bairro}</p>
                          <p className="font-semibold text-slate-800">{data.estabelecimento?.cidade?.nome} / {data.estabelecimento?.estado?.sigla}</p>
                          <p><span className="font-semibold">CEP:</span> {formatValue('cep', data.estabelecimento?.cep)}</p>
                        </SummaryCard>

                        <SummaryCard title="Contatos" icon={<IconPhone />}>
                          <div className="flex items-center gap-2 mb-2">
                            <IconMail />
                            {data.estabelecimento?.email ? <a href={`mailto:${data.estabelecimento.email}`} className="text-blue-600 hover:underline break-all">{data.estabelecimento.email}</a> : <span className="text-slate-400 italic">Sem e-mail</span>}
                          </div>
                          <div className="flex items-center gap-2 mb-2">
                            <IconPhone />
                            <span>{data.estabelecimento?.ddd1 ? `(${data.estabelecimento.ddd1}) ${data.estabelecimento.telefone1}` : <span className="text-slate-400 italic">Sem telefone</span>}</span>
                          </div>
                        </SummaryCard>

                        <SummaryCard title="Atividades" icon={<IconBriefcase />}>
                          <p className="mb-2"><span className="font-semibold block text-slate-800 mb-1">CNAE Principal:</span>{data.estabelecimento?.atividade_principal?.id} - {data.estabelecimento?.atividade_principal?.descricao}</p>
                          <div className="mt-4 pt-4 border-t border-slate-100">
                            <span className="font-semibold block mb-2">Inscrições Estaduais:</span>
                            {data.estabelecimento?.inscricoes_estaduais?.length > 0 ? (
                              <div className="flex flex-wrap gap-2">
                                {data.estabelecimento.inscricoes_estaduais.map((ie, idx) => (
                                  <span key={idx} className="bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs border border-slate-200">{ie.estado.sigla}: <strong className="font-mono">{ie.inscricao_estadual}</strong></span>
                                ))}
                              </div>
                            ) : <span className="text-slate-400 italic text-sm">Nenhuma IE localizada.</span>}
                          </div>
                        </SummaryCard>
                      </div>
                    )}

                    {viewMode === 'dynamic' && (
                      <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                          <h3 className="font-bold text-slate-800 flex items-center gap-2"><IconList /> Estrutura de Dados</h3>
                          <div className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold">{totalFields} campos detectados</div>
                        </div>
                        <div className="p-4 max-h-[70vh] overflow-y-auto">
                          <DynamicNode label="Informações do CNPJ" value={data} defaultExpanded={true} />
                        </div>
                      </div>
                    )}

                    {viewMode === 'raw' && (
                      <div className="bg-[#1e1e1e] rounded-xl shadow-lg border border-slate-800 overflow-hidden relative">
                        <div className="absolute top-4 right-4 flex gap-2">
                          <button onClick={copyJson} className="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded flex items-center gap-2 text-sm transition-colors shadow">
                            {copied ? <><IconCheck /> Copiado</> : <><IconCopy /> Copiar JSON</>}
                          </button>
                        </div>
                        <div className="p-4 bg-[#252526] border-b border-[#333]">
                          <h3 className="font-mono text-sm text-slate-300 flex items-center gap-2"><IconCode /> response.json</h3>
                        </div>
                        <pre className="p-6 text-sm font-mono text-[#d4d4d4] overflow-x-auto max-h-[70vh] overflow-y-auto custom-scrollbar">{JSON.stringify(data, null, 2)}</pre>
                      </div>
                    )}
                  </div>
                )}
              </main>
            </div>
          );
        }

        // Renderiza o componente na div root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e1e1e; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</body>
</html>
